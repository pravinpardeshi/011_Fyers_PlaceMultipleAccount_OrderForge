<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Account Trade Terminal</title>
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-buy: #10b981;
            --accent-sell: #ef4444;
            --border-color: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }
        h2 { margin-top: 0; font-weight: 600; text-align: center; margin-bottom: 25px;}
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus { outline: 1px solid #38bdf8; }
        .btn-container { display: flex; gap: 15px; margin-top: 25px; }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-buy { background-color: var(--accent-buy); color: white; }
        .btn-sell { background-color: var(--accent-sell); color: white; }
        .response-box {
            margin-top: 25px;
            padding: 15px;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            display: none;
        }
        pre { margin: 0; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi-Account Copier</h2>
    
    <div class="form-group">
        <label for="symbol">Trading Symbol (NSE Format)</label>
        <input type="text" id="symbol" value="NSE:SBIN-EQ">
    </div>

    <div class="form-group">
        <label for="qty">Quantity</label>
        <input type="number" id="qty" value="1" min="1">
    </div>

    <div class="form-group">
        <label for="productType">Product Type</label>
        <select id="productType">
            <option value="INTRADAY">INTRADAY (MIS)</option>
            <option value="CNC">CNC (Delivery)</option>
            <option value="MARGIN">MARGIN</option>
        </select>
    </div>

    <div class="form-group">
        <label for="orderType">Order Type</label>
        <select id="orderType">
            <option value="2">Market Order</option>
            <option value="1">Limit Order</option>
        </select>
    </div>

    <div class="btn-container">
        <button class="btn-buy" onclick="fireOrder(1)">BUY</button>
        <button class="btn-sell" onclick="fireOrder(-1)">SELL</button>
    </div>

    <div class="response-box" id="responseBox">
        <label style="margin-bottom: 5px;">Execution Broker Summary Log:</label>
        <pre id="logOutput">Waiting for execution...</pre>
    </div>
</div>

<script>
    async def fireOrder(sideCode) {
        const responseBox = document.getElementById('responseBox');
        const logOutput = document.getElementById('logOutput');
        
        responseBox.style.display = 'block';
        logOutput.textContent = 'Transmitting execution bursts...';

        const payload = {
            symbol: document.getElementById('symbol').value,
            qty: parseInt(document.getElementById('qty').value),
            type: parseInt(document.getElementById('orderType').value),
            productType: document.getElementById('productType').value,
            side: sideCode
        };

        try {
            const response = await fetch('http://127.0.0.1:8000/api/v1/place-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            logOutput.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
            logOutput.textContent = `Network / Core API Connection Error:\n${error.message}`;
        }
    }
</script>

</body>
</html>
